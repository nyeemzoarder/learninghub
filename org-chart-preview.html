<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure Hierarchy - Tree Diagram</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#151d63;--text:#1f2937;--border:#d9e0ef;--bg:#f6f8fc;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,-apple-system,'Segoe UI',sans-serif;background:var(--bg);padding:20px;color:var(--text)}

.container{max-width:900px;margin:0 auto}
h2{color:var(--primary);font-size:1.4rem;margin-bottom:20px;font-weight:800}

svg{width:100%;height:auto;display:block;border:1px solid var(--border);border-radius:8px;background:#fff;padding:15px}

.node-box{fill:#dbeafe;stroke:#60a5fa;stroke-width:2}
.node-text{font-size:11px;font-weight:600;text-anchor:middle;fill:var(--primary)}
.node-sub{font-size:9px;text-anchor:middle;fill:#0369a1;font-weight:500}
.connector{stroke:#93c5fd;stroke-width:1.5;fill:none}

.icon{font-size:14px;text-anchor:middle;dominant-baseline:middle}

/* Level colors */
.level1 .node-box{fill:#dbeafe;stroke:#3b82f6}
.level2 .node-box{fill:#ecf8ff;stroke:#06b6d4}
.level3 .node-box{fill:#f5f3ff;stroke:#8b5cf6}
.level4 .node-box{fill:#fff5f9;stroke:#ec4899}

.legend{margin-top:15px;font-size:0.85rem;color:var(--text);padding:12px;background:#f0f9ff;border-left:3px solid #0284c7;border-radius:6px}
.legend strong{color:var(--primary)}
</style>
</head>
<body>

<div class="container">
  <h2>Azure Organizational Hierarchy</h2>

  <svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">

    <!-- CONNECTORS -->
    <line class="connector" x1="450" y1="50" x2="450" y2="75"/>

    <!-- Root MG to Level 3 MGs -->
    <line class="connector" x1="450" y1="125" x2="450" y2="150"/>
    <line class="connector" x1="200" y1="150" x2="200" y2="175"/>
    <line class="connector" x1="450" y1="150" x2="450" y2="175"/>
    <line class="connector" x1="700" y1="150" x2="700" y2="175"/>
    <line class="connector" x1="200" y1="150" x2="700" y2="150"/>

    <!-- Level 3 to Subscriptions -->
    <line class="connector" x1="200" y1="225" x2="200" y2="250"/>
    <line class="connector" x1="100" y1="250" x2="100" y2="275"/>
    <line class="connector" x1="300" y1="250" x2="300" y2="275"/>
    <line class="connector" x1="100" y1="250" x2="300" y2="250"/>

    <line class="connector" x1="450" y1="225" x2="450" y2="250"/>
    <line class="connector" x1="450" y1="250" x2="450" y2="275"/>

    <line class="connector" x1="700" y1="225" x2="700" y2="250"/>
    <line class="connector" x1="600" y1="250" x2="600" y2="275"/>
    <line class="connector" x1="800" y1="250" x2="800" y2="275"/>
    <line class="connector" x1="600" y1="250" x2="800" y2="250"/>

    <!-- Subscriptions to Resources -->
    <line class="connector" x1="100" y1="325" x2="100" y2="350"/>
    <line class="connector" x1="300" y1="325" x2="300" y2="350"/>
    <line class="connector" x1="450" y1="325" x2="450" y2="350"/>
    <line class="connector" x1="600" y1="325" x2="600" y2="350"/>
    <line class="connector" x1="800" y1="325" x2="800" y2="350"/>

    <!-- LEVEL 1: Tenant -->
    <g class="level1">
      <rect class="node-box" x="400" y="10" width="100" height="35" rx="5"/>
      <text class="icon" x="415" y="27.5">🏢</text>
      <text class="node-text" x="450" y="20">Azure Tenant</text>
      <text class="node-sub" x="450" y="35">Organization</text>
    </g>

    <!-- LEVEL 2: Root Management Group -->
    <g class="level1">
      <rect class="node-box" x="400" y="75" width="100" height="35" rx="5"/>
      <text class="icon" x="415" y="92.5">📦</text>
      <text class="node-text" x="450" y="85">Root MG</text>
      <text class="node-sub" x="450" y="100">Management</text>
    </g>

    <!-- LEVEL 3: Management Groups -->
    <g class="level2">
      <!-- IT MG -->
      <rect class="node-box" x="150" y="175" width="100" height="35" rx="5"/>
      <text class="icon" x="165" y="192.5">💼</text>
      <text class="node-text" x="200" y="185">IT MG</text>
      <text class="node-sub" x="200" y="200">Department</text>

      <!-- Business MG -->
      <rect class="node-box" x="400" y="175" width="100" height="35" rx="5"/>
      <text class="icon" x="415" y="192.5">📊</text>
      <text class="node-text" x="450" y="185">Business MG</text>
      <text class="node-sub" x="450" y="200">Department</text>

      <!-- Location MG -->
      <rect class="node-box" x="650" y="175" width="100" height="35" rx="5"/>
      <text class="icon" x="665" y="192.5">🌍</text>
      <text class="node-text" x="700" y="185">Location MG</text>
      <text class="node-sub" x="700" y="200">Department</text>
    </g>

    <!-- LEVEL 4: Subscriptions -->
    <g class="level3">
      <!-- IT Subscriptions -->
      <rect class="node-box" x="50" y="275" width="90" height="35" rx="5"/>
      <text class="icon" x="62" y="292.5">🔑</text>
      <text class="node-text" x="95" y="285">IT_Core</text>
      <text class="node-sub" x="95" y="300">Subscription</text>

      <rect class="node-box" x="255" y="275" width="90" height="35" rx="5"/>
      <text class="icon" x="267" y="292.5">🔑</text>
      <text class="node-text" x="300" y="285">IT_IaaS</text>
      <text class="node-sub" x="300" y="300">Subscription</text>

      <!-- Business Subscription -->
      <rect class="node-box" x="405" y="275" width="90" height="35" rx="5"/>
      <text class="icon" x="417" y="292.5">🔑</text>
      <text class="node-text" x="450" y="285">Business_Prod</text>
      <text class="node-sub" x="450" y="300">Subscription</text>

      <!-- Location Subscriptions -->
      <rect class="node-box" x="555" y="275" width="90" height="35" rx="5"/>
      <text class="icon" x="567" y="292.5">🔑</text>
      <text class="node-text" x="600" y="285">Loc_US</text>
      <text class="node-sub" x="600" y="300">Subscription</text>

      <rect class="node-box" x="760" y="275" width="90" height="35" rx="5"/>
      <text class="icon" x="772" y="292.5">🔑</text>
      <text class="node-text" x="805" y="285">Loc_EU</text>
      <text class="node-sub" x="805" y="300">Subscription</text>
    </g>

    <!-- LEVEL 5: Resources -->
    <g class="level4">
      <rect class="node-box" x="50" y="350" width="90" height="35" rx="5"/>
      <text class="icon" x="62" y="367.5">📂</text>
      <text class="node-text" x="95" y="360">RG</text>
      <text class="node-sub" x="95" y="375">Resources</text>

      <rect class="node-box" x="255" y="350" width="90" height="35" rx="5"/>
      <text class="icon" x="267" y="367.5">💻</text>
      <text class="node-text" x="300" y="360">VMs</text>
      <text class="node-sub" x="300" y="375">Compute</text>

      <rect class="node-box" x="405" y="350" width="90" height="35" rx="5"/>
      <text class="icon" x="417" y="367.5">🗄️</text>
      <text class="node-text" x="450" y="360">SQL</text>
      <text class="node-sub" x="450" y="375">Database</text>

      <rect class="node-box" x="555" y="350" width="90" height="35" rx="5"/>
      <text class="icon" x="567" y="367.5">💾</text>
      <text class="node-text" x="600" y="360">Storage</text>
      <text class="node-sub" x="600" y="375">Blob/Files</text>

      <rect class="node-box" x="760" y="350" width="90" height="35" rx="5"/>
      <text class="icon" x="772" y="367.5">🐳</text>
      <text class="node-text" x="805" y="360">K8s</text>
      <text class="node-sub" x="805" y="375">Container</text>
    </g>

  </svg>

  <div class="legend">
    <strong>📊 How it works:</strong> Policies set at Root MG cascade down through all Management Groups → all Subscriptions → all Resource Groups → all Resources. One policy = applied everywhere below.
  </div>

</div>

</body>
</html>
